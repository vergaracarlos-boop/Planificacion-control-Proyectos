<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Formativa: Planificación de Proyectos</title>
    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Librería para generar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-color: #F0F3F8;
            --text-main: #1E2A3A;
            --accent: #4A6FA5;
            --accent-soft: #5D7BA0;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --correct: #27ae60;
            --incorrect: #e74c3c;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #F5F7FA 0%, #E4E9F2 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
            color: var(--accent);
        }

        .screen {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Pantalla 1: Login */
        .input-group {
            position: relative;
            margin: 30px 0;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border-radius: 40px;
            border: 1px solid #D1D9E6;
            background: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .domain-tag {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            pointer-events: none;
            font-size: 0.9rem;
        }

        /* Pantalla 2: Quiz */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #64748B;
        }

        .user-info {
            font-weight: 600;
            color: var(--accent);
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            background: white;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover {
            border-color: var(--accent);
            background: #F8FAFC;
        }

        .option-btn.selected {
            border-color: var(--accent);
            background: rgba(74, 111, 165, 0.05);
            box-shadow: 0 0 0 2px var(--accent);
        }

        .option-btn.correct-visual {
            border-color: var(--correct);
            background: rgba(39, 174, 96, 0.05);
        }

        .option-btn.incorrect-visual {
            border-color: var(--incorrect);
            background: rgba(231, 76, 60, 0.05);
        }

        .feedback-area {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            display: none;
        }

        .feedback-correct {
            background: rgba(39, 174, 96, 0.1);
            color: #1e8449;
            border-left: 4px solid var(--correct);
        }

        .feedback-incorrect {
            background: rgba(231, 76, 60, 0.1);
            color: #922b21;
            border-left: 4px solid var(--incorrect);
        }

        /* Controles */
        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 32px;
            gap: 15px;
        }

        button {
            padding: 14px 28px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            flex-grow: 1;
        }

        .btn-primary:hover {
            background: var(--accent-soft);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #E2E8F0;
            color: #475569;
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Pantalla 3: Resumen */
        .summary-card {
            text-align: center;
        }

        .score-display {
            font-size: 3rem;
            font-weight: 600;
            margin: 20px 0;
            color: var(--accent);
        }

        .warning-box {
            background: #FFFBEB;
            border: 1px solid #FCD34D;
            color: #92400E;
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
            text-align: left;
        }

        .footer-note {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #64748B;
        }

        @media (max-width: 500px) {
            .container { padding: 25px; }
            .domain-tag { display: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- PANTALLA 1: INICIO/CORREO -->
        <div id="screen-login" class="screen active">
            <h1>Acceso al Cuestionario</h1>
            <p style="text-align: center; color: #64748B;">Bienvenido a la evaluación de Planificación y Control.</p>
            <div class="input-group">
                <input type="text" id="user-email" placeholder="Nombre de usuario" autocomplete="off">
                <span class="domain-tag">@alumnos.ulagos.cl</span>
            </div>
            <button class="btn-primary" onclick="startQuiz()" style="width: 100%;">Comenzar Evaluación</button>
        </div>

        <!-- PANTALLA 2: PREGUNTAS -->
        <div id="screen-quiz" class="screen">
            <div class="quiz-header">
                <span id="current-question-count">Pregunta 1/10</span>
                <span class="user-info" id="display-email"></span>
            </div>
            <div id="question-container">
                <div class="question-text" id="q-text"></div>
                <div class="options-container" id="options"></div>
            </div>
            <div id="feedback" class="feedback-area"></div>
            
            <div class="controls">
                <button id="btn-prev" class="btn-secondary" onclick="prevQuestion()">Anterior</button>
                <button id="btn-next" class="btn-primary" onclick="handleNext()">Siguiente</button>
            </div>
        </div>

        <!-- PANTALLA 3: RESULTADO -->
        <div id="screen-result" class="screen">
            <div class="summary-card">
                <h1>Resultado de la Evaluación</h1>
                <div class="score-display" id="final-score">0/10</div>
                <div id="recommendation-area"></div>
                
                <div class="controls" style="flex-direction: column;">
                    <button class="btn-primary" onclick="downloadPDF()">📄 Descargar Resumen (PDF)</button>
                    <button id="btn-retry" class="btn-secondary" onclick="restartQuiz()" style="margin-top: 10px; display: none;">Reintentar Cuestionario</button>
                </div>
                <p class="footer-note">Recuerda subir el PDF al chat de la asignatura para validar tu participación.</p>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;

        // BANCO DE PREGUNTAS
        const quizData = [
            {
                q: "¿Cuál es el propósito fundamental de la Estructura de Desglose del Trabajo (EDT) en la planificación?",
                options: [
                    "Definir el presupuesto total asignado al proyecto.",
                    "Descomponer el proyecto en paquetes de trabajo manejables.",
                    "Establecer la secuencia lógica de todas las actividades.",
                    "Asignar responsabilidades legales a los subcontratistas."
                ],
                correct: 1,
                explain: "La EDT es una descomposición jerárquica orientada al producto final, lo que facilita la gestión y asignación de tareas."
            },
            {
                q: "Dentro de la metodología del Camino Crítico (CPM), ¿qué define a una actividad crítica?",
                options: [
                    "Es la tarea que demanda la mayor cantidad de recursos financieros.",
                    "Su retraso afecta directamente la fecha de finalización del proyecto.",
                    "Representa el hito más importante para el cliente o inversor.",
                    "Requiere la supervisión directa del director general de la obra."
                ],
                correct: 1,
                explain: "Las actividades críticas tienen holgura cero; cualquier demora en ellas desplaza el término total del proyecto."
            },
            {
                q: "¿Qué representa la 'holgura total' de una actividad no crítica?",
                options: [
                    "El tiempo máximo que una tarea puede retrasarse sin afectar al hito final.",
                    "El margen de error permitido en el presupuesto de dicha actividad.",
                    "La cantidad de trabajadores adicionales que se pueden contratar.",
                    "El tiempo de descanso obligatorio entre jornadas laborales."
                ],
                correct: 0,
                explain: "La holgura total permite flexibilidad en la programación sin comprometer la entrega comprometida del proyecto."
            },
            {
                q: "¿Cuál es la principal ventaja de utilizar un Diagrama de Gantt en el control de proyectos?",
                options: [
                    "Permite realizar cálculos matemáticos de probabilidades de éxito.",
                    "Visualiza de forma clara la cronología y el progreso de las tareas.",
                    "Garantiza que no existirán conflictos entre los recursos humanos.",
                    "Elimina la necesidad de realizar reuniones de seguimiento semanal."
                ],
                correct: 1,
                explain: "El Gantt es una herramienta de comunicación visual potente que muestra la duración y el solapamiento de actividades."
            },
            {
                q: "¿En qué se diferencia principalmente la técnica PERT del método CPM?",
                options: [
                    "PERT utiliza estimaciones probabilísticas de tiempo para las tareas.",
                    "CPM es exclusivo para proyectos de construcción de gran escala.",
                    "PERT no permite la identificación de una ruta crítica clara.",
                    "CPM se enfoca únicamente en el control de la calidad del aire."
                ],
                correct: 0,
                explain: "PERT maneja la incertidumbre mediante tres tiempos (optimista, probable y pesimista), mientras CPM usa tiempos deterministas."
            },
            {
                q: "¿Cuál es el objetivo principal de la técnica de Nivelación de Recursos?",
                options: [
                    "Aumentar la duración del proyecto para reducir el estrés del equipo.",
                    "Ajustar las fechas de las actividades para evitar picos de demanda.",
                    "Reducir el costo de los materiales mediante compras al por mayor.",
                    "Sustituir la mano de obra humana por procesos automatizados."
                ],
                correct: 1,
                explain: "Busca optimizar el uso de recursos disponibles evitando que falten o sobren en periodos específicos."
            },
            {
                q: "Durante la fase de control, ¿qué indica una desviación negativa en el cronograma?",
                options: [
                    "Que el proyecto se está ejecutando según el plan original.",
                    "Que las actividades están tomando más tiempo del programado.",
                    "Que se ha logrado un ahorro significativo en los costos fijos.",
                    "Que el equipo de trabajo ha superado los objetivos de calidad."
                ],
                correct: 1,
                explain: "Una desviación negativa indica un retraso respecto a la línea base establecida en la planificación."
            },
            {
                q: "¿A qué se refiere el término 'Hito' (Milestone) en un cronograma?",
                options: [
                    "A una actividad con una duración extremadamente larga.",
                    "A un evento significativo que marca un logro importante.",
                    "Al costo máximo permitido para una fase específica.",
                    "A la herramienta utilizada para medir el terreno físico."
                ],
                correct: 1,
                explain: "Los hitos tienen duración cero y sirven para verificar el progreso clave y las entregas parciales."
            },
            {
                q: "En gestión de proyectos, ¿qué implica la técnica de 'Crashing' o Compresión?",
                options: [
                    "Reducir la calidad de los acabados para terminar más rápido.",
                    "Añadir recursos a actividades críticas para acortar la duración.",
                    "Cancelar las tareas que tienen una holgura superior a diez días.",
                    "Dividir el proyecto en dos contratos independientes."
                ],
                correct: 1,
                explain: "El Crashing busca reducir el tiempo total del proyecto incrementando recursos, generalmente aumentando el costo."
            },
            {
                q: "¿Por qué es fundamental definir una 'Línea Base' antes de ejecutar el proyecto?",
                options: [
                    "Para ocultar los errores de cálculo iniciales ante el cliente.",
                    "Para tener un punto de referencia y medir el desempeño real.",
                    "Porque es un requisito legal exigido por el ministerio de obras.",
                    "Para asignar los nombres definitivos a los archivos de diseño."
                ],
                correct: 1,
                explain: "Sin línea base no hay forma de saber si el proyecto va adelantado, retrasado o dentro del presupuesto."
            }
        ];

        // ESTADO DE LA APLICACIÓN
        let currentIdx = 0;
        let userAnswers = new Array(quizData.length).fill(null);
        let userEmail = "";

        // INICIALIZACIÓN
        function startQuiz() {
            const emailInput = document.getElementById('user-email').value.trim();
            if (!emailInput) {
                return; // Validación simple
            }
            userEmail = emailInput + "@alumnos.ulagos.cl";
            document.getElementById('display-email').innerText = userEmail;
            showScreen('screen-quiz');
            renderQuestion();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // RENDERIZADO DE PREGUNTA
        function renderQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('current-question-count').innerText = `Pregunta ${currentIdx + 1}/${quizData.length}`;
            document.getElementById('q-text').innerText = q.q;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = "";
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                
                // Si ya fue respondida, mostrar visualmente
                if (userAnswers[currentIdx] !== null) {
                    if (i === q.correct) btn.classList.add('correct-visual');
                    else if (i === userAnswers[currentIdx]) btn.classList.add('incorrect-visual');
                    btn.style.pointerEvents = "none";
                }

                btn.innerText = opt;
                btn.onclick = () => selectOption(i);
                optionsDiv.appendChild(btn);
            });

            // Feedback
            const feedback = document.getElementById('feedback');
            if (userAnswers[currentIdx] !== null) {
                const isCorrect = userAnswers[currentIdx] === q.correct;
                feedback.style.display = "block";
                feedback.className = `feedback-area ${isCorrect ? 'feedback-correct' : 'feedback-incorrect'}`;
                feedback.innerHTML = isCorrect ? 
                    `✅ Correcto. ${q.explain}` : 
                    `❌ Incorrecto. La respuesta correcta era: <strong>${q.options[q.correct]}</strong>. ${q.explain}`;
            } else {
                feedback.style.display = "none";
            }

            // Navegación
            document.getElementById('btn-prev').disabled = currentIdx === 0;
            document.getElementById('btn-next').innerText = currentIdx === quizData.length - 1 ? "Finalizar" : "Siguiente";
        }

        function selectOption(i) {
            if (userAnswers[currentIdx] !== null) return;
            userAnswers[currentIdx] = i;
            renderQuestion();
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
            }
        }

        function handleNext() {
            if (userAnswers[currentIdx] === null) return;

            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        // PANTALLA FINAL
        function showResults() {
            const score = userAnswers.reduce((acc, ans, idx) => (ans === quizData[idx].correct ? acc + 1 : acc), 0);
            document.getElementById('final-score').innerText = `${score}/${quizData.length} correctas`;
            
            const recArea = document.getElementById('recommendation-area');
            const retryBtn = document.getElementById('btn-retry');
            
            if (score < 3) {
                recArea.innerHTML = `
                    <div class="warning-box">
                        <strong>⚠️ Recomendación:</strong><br>
                        Has respondido correctamente menos de 3 preguntas. Te sugerimos revisar nuevamente el video y el PDF de la Semana 7 antes de la sesión presencial.
                    </div>`;
                retryBtn.style.display = "block";
            } else {
                recArea.innerHTML = `<p style="margin-bottom: 20px;">¡Buen trabajo! Has completado la revisión formativa satisfactoriamente.</p>`;
                retryBtn.style.display = "none";
            }

            showScreen('screen-result');
        }

        function restartQuiz() {
            currentIdx = 0;
            userAnswers = new Array(quizData.length).fill(null);
            showScreen('screen-quiz');
            renderQuestion();
        }

        // GENERACIÓN DE PDF
        function downloadPDF() {
            const doc = new jsPDF();
            const score = userAnswers.reduce((acc, ans, idx) => (ans === quizData[idx].correct ? acc + 1 : acc), 0);
            const date = new Date().toLocaleDateString();

            doc.setFontSize(20);
            doc.text("Resumen de Evaluación Formativa", 20, 20);
            doc.setFontSize(12);
            doc.text(`Estudiante: ${userEmail}`, 20, 35);
            doc.text(`Fecha: ${date}`, 20, 42);
            doc.text(`Puntaje Final: ${score}/10`, 20, 49);
            
            doc.line(20, 55, 190, 55);
            
            let y = 65;
            quizData.forEach((item, i) => {
                const status = userAnswers[i] === item.correct ? "CORRECTA" : "INCORRECTA";
                const text = `${i + 1}. ${item.q.substring(0, 70)}... [${status}]`;
                doc.text(text, 20, y);
                y += 10;
                if (y > 270) { doc.addPage(); y = 20; }
            });

            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text("Documento generado para validación de actividad Aula Invertida.", 20, y + 20);

            doc.save(`Resumen_Quiz_${userEmail.split('@')[0]}.pdf`);
        }
    </script>
</body>
</html>
